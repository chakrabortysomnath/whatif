services:
  - type: web
    name: portfolio-whatif
    env: python
    plan: starter          # $7/mo — always on, no spin-down
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: PASSWORD
        sync: false        # Set manually in Render dashboard — never commit
